<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할루시네이션: 해고전쟁 — 사전 평가</title>
<style>
:root {
  --bg: #05090d; --surface: #0f1923; --border: rgba(255,255,255,0.08);
  --text: #e8eaed; --muted: rgba(255,255,255,0.4); --accent: #6366f1;
  --gold: #ffd700; --green: #59d28f; --cyan: #4ed9e8; --orange: #f3b63f; --red-light: #ff6b3d; --red: #ff2d2d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(170deg, #05090d 0%, #0a1520 40%, #0d1a28 100%); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left img { height: 24px; }
.header-title { font-size: 1rem; font-weight: 800; }
.header-sub { font-size: 0.7rem; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-right img { height: 26px; filter: brightness(1.3); }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }

/* Controls bar */
.controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.btn { padding: 6px 18px; border: 2px solid var(--accent); background: transparent; color: var(--accent); border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn:hover { background: rgba(99,102,241,0.15); }
.btn-primary { background: var(--accent); color: #fff; }
.btn:disabled { opacity: 0.3; cursor: default; }
.counter { font-size: 0.8rem; color: var(--muted); }

/* Full-screen person view */
.person-view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }

.person-card { text-align: center; animation: personIn 0.6s ease-out; max-width: 500px; width: 100%; }
@keyframes personIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

.person-photo { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid var(--border); margin: 0 auto 1.5rem; display: block; transition: border-color 0.5s; }
.person-photo.revealed { border-color: var(--grade-color); box-shadow: 0 0 30px var(--grade-color-glow); }

.person-name { font-size: 2.2rem; font-weight: 900; margin-bottom: 0.3rem; }
.person-dept { font-size: 1rem; color: var(--muted); margin-bottom: 0.3rem; }
.person-aptitude { font-size: 0.9rem; color: var(--accent); margin-bottom: 2rem; }

/* Grade area */
.grade-area { min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
.grade-hidden { font-size: 2rem; color: var(--muted); letter-spacing: 0.3em; }
.grade-spinning { font-size: 5rem; font-weight: 900; animation: gradeShake 0.08s infinite; color: var(--gold); }
.grade-final { font-size: 7rem; font-weight: 900; text-shadow: 0 0 60px currentColor; animation: gradeLock 0.6s ease-out; }
.grade-label { font-size: 1.2rem; font-weight: 700; margin-top: 6px; }
@keyframes gradeShake { 0% { transform: translateY(-3px); } 50% { transform: translateY(3px); } 100% { transform: translateY(-3px); } }
@keyframes gradeLock { 0% { transform: scale(2.5); opacity: 0; } 40% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }

/* Keywords */
.keywords { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; opacity: 0; transition: opacity 0.5s; }
.keywords.show { opacity: 1; }
.keyword { font-size: 0.9rem; padding: 4px 14px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); }

/* Summary */
.person-summary { font-size: 1rem; color: rgba(255,255,255,0.7); line-height: 1.7; max-width: 450px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }
.person-summary.show { opacity: 1; }

/* Navigation arrows */
.nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2rem; color: var(--muted); cursor: pointer; padding: 20px; transition: color 0.2s; user-select: none; }
.nav-arrow:hover { color: var(--text); }
.nav-arrow.left { left: 20px; }
.nav-arrow.right { right: 20px; }

/* Empty state */
.empty-state { text-align: center; }
.empty-state h2 { font-size: 1.5rem; color: var(--gold); margin-bottom: 0.5rem; }
.empty-state p { color: var(--muted); }
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-left">
    <img src="jtbc.png" alt="JTBC">
    <div>
      <div class="header-title">할루시네이션: 해고전쟁</div>
      <div class="header-sub">ORBIT CONSULTING — 사전 평가</div>
    </div>
  </div>
  <div class="header-right">
    <img src="kisti.svg" alt="KISTI">
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="prevPerson()" id="btnPrev" disabled>◀ 이전</button>
  <span class="counter" id="counter">- / 6</span>
  <button class="btn" onclick="nextPerson()" id="btnNext" disabled>다음 ▶</button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 8px"></span>
  <button class="btn btn-primary" onclick="revealGrade()" id="btnReveal">등급 공개</button>
  <button class="btn" onclick="autoAll()">자동 전체</button>
</div>

<div class="person-view" id="personView">
  <div class="empty-state">
    <h2>사전 평가</h2>
    <p>"다음" 버튼으로 출연자를 확인하세요</p>
  </div>
</div>

</div>

<script>
const GRADES = ['S','A','B','C','D','F'];
const GRADE_COLORS = { S:'#ffd700', A:'#59d28f', B:'#4ed9e8', C:'#f3b63f', D:'#ff6b3d', F:'#ff2d2d' };
const GRADE_LABELS = { S:'최적', A:'안정', B:'양호', C:'보류', D:'주의', F:'해고 위기' };
let data = null;
let currentIdx = -1;
let revealedSet = new Set();

// Sort: F first → S last (drama order)
let ordered = [];

async function init() {
  const res = await fetch('data.json');
  data = await res.json();
  ordered = [...data.evaluations].sort((a,b) => GRADES.indexOf(b.grade) - GRADES.indexOf(a.grade));
  document.getElementById('btnNext').disabled = false;
  updateCounter();
}

function updateCounter() {
  document.getElementById('counter').textContent = currentIdx >= 0 ? `${currentIdx + 1} / ${ordered.length}` : '- / ' + ordered.length;
  document.getElementById('btnPrev').disabled = currentIdx <= 0;
  document.getElementById('btnNext').disabled = currentIdx >= ordered.length - 1;
  document.getElementById('btnReveal').disabled = currentIdx < 0 || revealedSet.has(ordered[currentIdx].id);
}

function showPerson(idx) {
  const ev = ordered[idx];
  const view = document.getElementById('personView');
  const isRevealed = revealedSet.has(ev.id);
  const gc = GRADE_COLORS[ev.grade];

  view.innerHTML = `
    <div class="nav-arrow left" onclick="prevPerson()">◀</div>
    <div class="person-card">
      <img class="person-photo ${isRevealed ? 'revealed' : ''}" src="${ev.img}" alt="${ev.name}" style="--grade-color:${gc};--grade-color-glow:${gc}40">
      <div class="person-name">${ev.name}</div>
      <div class="person-dept">${ev.department} ${ev.title}</div>
      <div class="person-aptitude">AI 적합도 ${ev.aiAptitude}% · ${ev.category}</div>
      <div class="grade-area" id="gradeArea">
        ${isRevealed
          ? `<div class="grade-final" style="color:${gc}">${ev.grade}</div><div class="grade-label" style="color:${gc}">${ev.grade}등급 — ${GRADE_LABELS[ev.grade]}</div>`
          : `<div class="grade-hidden">? ? ?</div>`
        }
      </div>
      <div class="keywords ${isRevealed ? 'show' : ''}" id="kwArea">
        ${ev.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
      </div>
      <div class="person-summary ${isRevealed ? 'show' : ''}" id="sumArea">${ev.summary}</div>
    </div>
    <div class="nav-arrow right" onclick="nextPerson()">▶</div>
  `;
  updateCounter();
}

function nextPerson() {
  if (currentIdx < ordered.length - 1) {
    currentIdx++;
    showPerson(currentIdx);
  }
}

function prevPerson() {
  if (currentIdx > 0) {
    currentIdx--;
    showPerson(currentIdx);
  }
}

function revealGrade() {
  if (currentIdx < 0) return;
  const ev = ordered[currentIdx];
  if (revealedSet.has(ev.id)) return;
  const gc = GRADE_COLORS[ev.grade];
  const gradeArea = document.getElementById('gradeArea');
  const kwArea = document.getElementById('kwArea');
  const sumArea = document.getElementById('sumArea');
  const photo = document.querySelector('.person-photo');

  // Spin
  let spinIdx = 0;
  const spinInterval = setInterval(() => {
    gradeArea.innerHTML = `<div class="grade-spinning">${GRADES[spinIdx % 6]}</div>`;
    spinIdx++;
  }, 80);

  // Slow + lock
  setTimeout(() => {
    clearInterval(spinInterval);
    let slowIdx = 0;
    const slowInterval = setInterval(() => {
      const grades = [...GRADES, ...GRADES, ev.grade];
      gradeArea.innerHTML = `<div class="grade-spinning" style="animation-duration:${0.15+slowIdx*0.03}s">${grades[slowIdx % grades.length]}</div>`;
      slowIdx++;
      if (slowIdx > 8) {
        clearInterval(slowInterval);
        gradeArea.innerHTML = `<div class="grade-final" style="color:${gc}">${ev.grade}</div><div class="grade-label" style="color:${gc}">${ev.grade}등급 — ${GRADE_LABELS[ev.grade]}</div>`;
        photo.classList.add('revealed');
        photo.style.setProperty('--grade-color', gc);
        photo.style.setProperty('--grade-color-glow', gc + '40');
        kwArea.classList.add('show');
        sumArea.classList.add('show');
        revealedSet.add(ev.id);
        updateCounter();

        if (window.speechSynthesis) {
          const u = new SpeechSynthesisUtterance(`${ev.department} ${ev.title} ${ev.name}. 사전 평가 등급 ${ev.grade}등급, ${GRADE_LABELS[ev.grade]}.`);
          u.lang = 'ko-KR'; u.rate = 0.85;
          speechSynthesis.speak(u);
        }
      }
    }, 180);
  }, 1500);
}

async function autoAll() {
  for (let i = 0; i < ordered.length; i++) {
    currentIdx = i;
    showPerson(i);
    await new Promise(r => setTimeout(r, 500));
    if (!revealedSet.has(ordered[i].id)) {
      revealGrade();
      await new Promise(r => setTimeout(r, 4500));
    }
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPerson(); }
  if (e.key === 'ArrowLeft') prevPerson();
  if (e.key === 'Enter') revealGrade();
});

init();
</script>
</body>
</html>
