<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할루시네이션: 해고전쟁</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(170deg, #05090d 0%, #0a1520 40%, #0d1a28 100%); color: #e8eaed; font-family: 'Noto Sans KR', -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px; height: 140px; border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(5,9,13,0.85); backdrop-filter: blur(8px);
}
.header-left { display: flex; align-items: center; gap: 24px; }
.header-left img { height: 72px; }
.header-title { font-size: 3rem; font-weight: 900; }
.header-sub { font-size: 1.4rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
.header-right img { height: 72px; filter: brightness(1.3); }

.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4vh; }
.main h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; color: #ffd700; text-align: center; }
.main p { font-size: clamp(1rem, 1.6vw, 1.3rem); color: rgba(255,255,255,0.5); text-align: center; }

.cards { display: flex; gap: 2.5vw; flex-wrap: wrap; justify-content: center; margin-top: 2vh; }
.card {
  width: clamp(200px, 18vw, 260px); padding: 3vh 2vw; border-radius: 16px;
  background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08);
  text-align: center; cursor: pointer; transition: all 0.3s;
  text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; gap: 1.5vh;
}
.card:hover { border-color: #6366f1; background: rgba(99,102,241,0.08); transform: translateY(-4px); }
.card-icon { font-size: 2.5rem; }
.card-title { font-size: clamp(1.1rem, 1.5vw, 1.4rem); font-weight: 800; }
.card-desc { font-size: clamp(0.8rem, 1vw, 0.95rem); color: rgba(255,255,255,0.4); line-height: 1.5; }

.card.accent-gold { border-color: rgba(255,215,0,0.2); }
.card.accent-gold:hover { border-color: #ffd700; background: rgba(255,215,0,0.06); }
.card.accent-red { border-color: rgba(255,45,45,0.2); }
.card.accent-red:hover { border-color: #ff2d2d; background: rgba(255,45,45,0.06); }
.card.accent-magenta { border-color: rgba(255,0,170,0.2); }
.card.accent-magenta:hover { border-color: #ff00aa; background: rgba(255,0,170,0.06); }
.card.accent-cyan { border-color: rgba(78,217,232,0.2); }
.card.accent-cyan:hover { border-color: #4ed9e8; background: rgba(78,217,232,0.06); }
.card.accent-green { border-color: rgba(89,210,143,0.2); }
.card.accent-green:hover { border-color: #59d28f; background: rgba(89,210,143,0.06); }
.card.accent-orange { border-color: rgba(243,182,63,0.2); }
.card.accent-orange:hover { border-color: #f3b63f; background: rgba(243,182,63,0.06); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="jtbc.png" alt="JTBC">
    <div>
      <div class="header-title">할루시네이션: 해고전쟁</div>
      <div class="header-sub">ORBIT CONSULTING — 평가 시스템</div>
    </div>
  </div>
  <div class="header-right">
    <img src="kisti.svg" alt="KISTI">
  </div>
</div>

<div class="main">
  <h1>평가 시스템</h1>
  <p>발표 단계를 선택하세요</p>

  <div class="cards">
    <a class="card accent-gold" href="pre1/index.html">
      <div class="card-icon">1</div>
      <div class="card-title">사전평가 v1</div>
      <div class="card-desc">순차 발표<br>스페이스바 진행</div>
    </a>
    <a class="card accent-cyan" href="pre2/index.html">
      <div class="card-icon">2</div>
      <div class="card-title">사전평가 v2</div>
      <div class="card-desc">숫자키 선택 + 룰렛<br>전체 7개 지표</div>
    </a>
    <a class="card accent-green" href="pre3/index.html">
      <div class="card-icon">3</div>
      <div class="card-title">사전평가 v3</div>
      <div class="card-desc">숫자키 선택 + 룰렛<br>최고/최악 부문만</div>
    </a>
    <a class="card accent-orange" href="mid/index.html">
      <div class="card-icon">M</div>
      <div class="card-title">중간평가</div>
      <div class="card-desc">S등급 / F등급<br>사람 룰렛</div>
    </a>
    <a class="card accent-red" href="final/index.html">
      <div class="card-icon">F</div>
      <div class="card-title">최종 인사발령</div>
      <div class="card-desc">해고 / 고용유지<br>최종 통보</div>
    </a>
  </div>

  <div style="margin-top:3vh;border-top:1px solid rgba(255,255,255,0.06);padding-top:3vh;width:100%;display:flex;justify-content:center">
    <div class="cards">
      <a class="card accent-magenta" href="replay/index.html">
        <div class="card-icon" style="font-size:2rem">AI</div>
        <div class="card-title">AI 토론 재생</div>
        <div class="card-desc">실무⑤ 토론 배틀<br>정적 재생 (서버 불필요)</div>
      </a>
      <a class="card" href="javascript:void(0)" onclick="openDebate()" id="debateCard">
        <div class="card-icon" style="font-size:2rem">EX</div>
        <div class="card-title">토론 서버</div>
        <div class="card-desc">실시간 생성 + TTS<br>(서버 필요)</div>
      </a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const VIZ_URL = (typeof CONFIG !== 'undefined' && CONFIG.TEAM_VIZ_URL) || 'http://localhost:3000';
function openDebate() { window.open(VIZ_URL + '/executor', '_blank'); }

// 서버 상태 체크
fetch(VIZ_URL + '/api/settings', { mode: 'no-cors' })
  .then(() => { document.getElementById('debateCard').querySelector('.card-desc').innerHTML += '<br><span style="color:#59d28f;font-size:0.8rem">● 서버 연결됨</span>'; })
  .catch(() => { document.getElementById('debateCard').querySelector('.card-desc').innerHTML += '<br><span style="color:#ff6b3d;font-size:0.8rem">○ 서버 미연결</span>'; });
</script>

</body>
</html>
