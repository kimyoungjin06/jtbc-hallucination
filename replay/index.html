<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할루시네이션: 해고전쟁 — AI 토론 재생</title>
<link rel="stylesheet" href="../common.css">
<link rel="stylesheet" href="../cyber-bg.css">
<style>
:root { --cyan: #00f0ff; --magenta: #ff00aa; --gold: #ffd700; --red: #ff2d2d; --green: #59d28f; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; color: #e8eaed; font-family: 'Noto Sans KR', sans-serif; height: 100vh; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; padding-top: 120px; }

/* 토론 선택 화면 */
.select-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 3vh; }
.select-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 3vw, 2.5rem); color: var(--cyan); text-align: center; margin-bottom: 1vh; }
.select-topic { font-size: clamp(1rem, 1.5vw, 1.3rem); color: rgba(255,255,255,0.5); text-align: center; max-width: 600px; line-height: 1.7; margin-bottom: 2vh; }
.select-cards { display: flex; gap: 3vw; }
.select-card {
  padding: 3vh 3vw; border-radius: 12px; cursor: pointer; text-align: center;
  min-width: 220px; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.select-card:hover { transform: translateY(-4px); }
.select-card.pro { border-color: rgba(0,240,255,0.2); }
.select-card.pro:hover { border-color: var(--cyan); background: rgba(0,240,255,0.06); }
.select-card.con { border-color: rgba(255,0,170,0.2); }
.select-card.con:hover { border-color: var(--magenta); background: rgba(255,0,170,0.06); }
.select-card .sc-result { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 1vh; }
.select-card.pro .sc-result { color: var(--cyan); }
.select-card.con .sc-result { color: var(--magenta); }
.select-card .sc-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5vh; }
.select-card .sc-desc { font-size: 0.85rem; color: rgba(255,255,255,0.4); }
.select-hint { font-size: 0.9rem; color: rgba(255,255,255,0.3); margin-top: 2vh; }

/* 재생 화면 */
.replay-screen { display: none; flex: 1; flex-direction: column; }
.replay-screen.active { display: flex; }

.replay-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5vh 3vw; border-bottom: 1px solid rgba(0,240,255,0.08); flex-shrink: 0;
}
.replay-phase { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--cyan); }
.replay-turn { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
.replay-controls { display: flex; gap: 1vw; align-items: center; }
.replay-btn {
  padding: 0.5vh 1.5vw; border: 1px solid rgba(0,240,255,0.2); background: none;
  color: var(--cyan); border-radius: 4px; cursor: pointer; font-size: 0.8rem;
  font-family: 'Share Tech Mono', monospace; transition: all 0.2s;
}
.replay-btn:hover { background: rgba(0,240,255,0.1); }
.replay-btn.active { background: rgba(0,240,255,0.15); border-color: var(--cyan); }

/* 채팅 로그 */
.chat-log { flex: 1; overflow-y: auto; padding: 2vh 3vw; }
.chat-msg { margin-bottom: 1.5vh; animation: msgIn 0.4s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.chat-agent {
  font-size: 0.8rem; font-weight: 700; margin-bottom: 0.3vh;
  display: flex; align-items: center; gap: 0.5vw;
}
.chat-agent .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.chat-agent .dot.pro { background: var(--cyan); }
.chat-agent .dot.con { background: var(--magenta); }
.chat-agent .dot.neutral { background: rgba(255,255,255,0.3); }
.chat-text { font-size: clamp(0.95rem, 1.2vw, 1.1rem); color: rgba(255,255,255,0.75); line-height: 1.7; padding-left: 1.2vw; }
.chat-phase-divider {
  text-align: center; padding: 1.5vh 0; margin: 1vh 0;
  font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--cyan); opacity: 0.5;
  border-top: 1px solid rgba(0,240,255,0.06);
}

/* 최종 입장문 */
.final-statement {
  margin: 2vh 3vw; padding: 3vh 3vw; border-radius: 12px; text-align: center;
  display: none; animation: msgIn 0.6s ease-out;
}
.final-statement.show { display: block; }
.final-statement.pro { background: rgba(0,240,255,0.05); border: 2px solid rgba(0,240,255,0.15); }
.final-statement.con { background: rgba(255,0,170,0.05); border: 2px solid rgba(255,0,170,0.15); }
.fs-label { font-family: 'Orbitron', sans-serif; font-size: 1rem; margin-bottom: 1.5vh; }
.final-statement.pro .fs-label { color: var(--cyan); }
.final-statement.con .fs-label { color: var(--magenta); }
.fs-text { font-size: clamp(1rem, 1.4vw, 1.2rem); color: rgba(255,255,255,0.8); line-height: 1.9; max-width: 700px; margin: 0 auto; }
.fs-result { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; margin-top: 2vh; }
</style>
</head>

<canvas id="bgCanvas"></canvas>

<div class="top-bar">
  <div class="top-left">
    <img src="../jtbc.png" alt="JTBC">
    <div class="top-title-wrap">
      <div class="top-title glitch" data-text="ARCHE SYSTEM">ARCHE SYSTEM</div>
      <div class="top-sub">ORBIT CONSULTING — AI 토론 재생</div>

  <div class="select-screen" id="selectScreen">
    <div class="select-title">AI 토론 배틀 — 결과 재생</div>

    <div class="select-cards">
      <div class="select-card pro" onclick="startReplay('pro')">
        <div class="sc-result">2 : 4</div>
        <div class="sc-label">찬성 측 베스트</div>
        <div class="sc-desc">찬성 2명이 끝까지 버팀<br>팽팽한 토론</div>
      </div>
      <div class="select-card con" onclick="startReplay('con')">
        <div class="sc-result">0 : 6</div>
        <div class="sc-label">반대 측 베스트</div>

      </div>
    </div>
    <div class="select-hint">키보드: 1 = 찬성 베스트 / 2 = 반대 베스트</div>
  </div>

  <!-- 재생 화면 -->
  <div class="replay-screen" id="replayScreen">
    <div class="replay-header">
      <div class="replay-phase" id="replayPhase">기 — 도입</div>
      <div class="replay-controls">
        <button class="replay-btn" onclick="toggleSpeed()" id="speedBtn">1x</button>
        <button class="replay-btn" onclick="skipToEnd()">끝으로 ▶▶</button>
        <button class="replay-btn" onclick="backToSelect()">← 돌아가기</button>
      </div>
      <div class="replay-turn" id="replayTurn">T0 / 30</div>
    </div>
    <div class="chat-log" id="chatLog"></div>
    <div class="final-statement pro" id="fsPro">
      <div class="fs-label">FINAL STATEMENT — 찬성</div>
      <div class="fs-text" id="fsProText"></div>
    </div>
    <div class="final-statement con" id="fsCon">
      <div class="fs-label">FINAL STATEMENT — 반대</div>
      <div class="fs-text" id="fsConText"></div>
      <div class="fs-result" id="fsResult"></div>
    </div>
  </div>
</div>

<script>
/* 데이터를 외부 파일에서 로드 시도, 실패하면 인라인 */
let DEBATE_PRO = null, DEBATE_CON = null, FINAL_STATEMENTS = null;

async function loadData() {
  try {
    const [r2, r1, fs] = await Promise.all([
      fetch('../debate/data/debate-result-2026-03-18T16-53-12.json').then(r=>r.json()),
      fetch('../debate/data/debate-result-2026-03-18T16-23-01.json').then(r=>r.json()),
      fetch('../debate/data/final-statements.json').then(r=>r.json()),
    ]);
    DEBATE_PRO = r2; DEBATE_CON = r1; FINAL_STATEMENTS = fs;
  } catch(e) {
    console.log('fetch failed, using inline data');
  }
}
</script>

/* 인라인 폴백 데이터 */

  }
  const turn = currentData.turns[currentTurnIdx];
  const log = document.getElementById('chatLog');

  // 단계 구분선
  const phase = PHASES.find(p => turn.turn >= p.from && turn.turn <= p.to);
  if (turn.turn === PHASES.find(p => p.from === turn.turn)?.from) {
    const divider = document.createElement('div');
    divider.className = 'chat-phase-divider';
    divider.textContent = phase?.name || '';
    log.appendChild(divider);
  }

  // 메시지
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  const stance = AGENT_STANCE[turn.agent] || 'neutral';
  msg.innerHTML = `
    <div class="chat-agent"><span class="dot ${stance}"></span> ${turn.agent} <span style="opacity:0.3;font-size:0.7rem">T${turn.turn}</span></div>
    <div class="chat-text">${turn.content}</div>
  `;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;

  // 상태 업데이트
  document.getElementById('replayPhase').textContent = phase?.name || '';
  document.getElementById('replayTurn').textContent = `T${turn.turn} / ${currentData.turns.length}`;

  currentTurnIdx++;
  const delay = [2000, 1000, 400][speed - 1] || 2000;
  playTimer = setTimeout(playNext, delay);
}

function showFinalStatements() {
  const fs = FINAL_STATEMENTS;
  document.getElementById('fsProText').textContent = fs.pro.statement;
  document.getElementById('fsConText').textContent = fs.con.statement;
  document.getElementById('fsPro').classList.add('show');
  setTimeout(() => {
    document.getElementById('fsCon').classList.add('show');
    const r = currentData.result;
    document.getElementById('fsResult').textContent = `최종 결과: 찬성 ${r.pro} : 반대 ${r.con}`;
    document.getElementById('fsResult').style.color = r.pro > r.con ? '#00f0ff' : '#ff00aa';
  }, 2000);
}

function toggleSpeed() {
  speed = speed >= 3 ? 1 : speed + 1;
  document.getElementById('speedBtn').textContent = speed + 'x';
}

function skipToEnd() {
  clearTimeout(playTimer);
  const log = document.getElementById('chatLog');
  while (currentTurnIdx < currentData.turns.length) {
    const turn = currentData.turns[currentTurnIdx];
    const phase = PHASES.find(p => turn.turn >= p.from && turn.turn <= p.to);
    if (turn.turn === PHASES.find(p => p.from === turn.turn)?.from) {
      const d = document.createElement('div');
      d.className = 'chat-phase-divider';
      d.textContent = phase?.name || '';
      log.appendChild(d);
    }
    const stance = AGENT_STANCE[turn.agent] || 'neutral';
    const msg = document.createElement('div');
    msg.className = 'chat-msg';
    msg.style.animation = 'none';
    msg.innerHTML = `<div class="chat-agent"><span class="dot ${stance}"></span> ${turn.agent} <span style="opacity:0.3;font-size:0.7rem">T${turn.turn}</span></div><div class="chat-text">${turn.content}</div>`;
    log.appendChild(msg);
    currentTurnIdx++;
  }
  log.scrollTop = log.scrollHeight;
  document.getElementById('replayTurn').textContent = `T30 / 30`;
  showFinalStatements();
}

function backToSelect() {
  clearTimeout(playTimer);
  document.getElementById('selectScreen').style.display = 'flex';
  document.getElementById('replayScreen').classList.remove('active');
}

// 키보드
document.addEventListener('keydown', e => {
  if (e.key === '1') startReplay('pro');
  if (e.key === '2') startReplay('con');
});

init();
</script>
</body>
</html>
