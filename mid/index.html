<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할루시네이션: 해고전쟁 — 중간평가</title>
<link rel="stylesheet" href="../common.css">
<link rel="stylesheet" href="../cyber-bg.css">
<style>
:root { --border: rgba(255,255,255,0.08); --text: #e8eaed; --muted: rgba(255,255,255,0.4); --accent: #6366f1; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; color: var(--text); font-family: 'Noto Sans KR', -apple-system, sans-serif; height: 100vh; overflow: hidden; cursor: none; }
/* 대기화면 ↔ 평가화면 전환 */
.cyber-standby { transition: opacity 0.6s; }
.cyber-standby.hidden { display: none; }
.app { display: none; }
.app.active { display: flex; height: 100vh; width: 100vw; padding-top: 120px; position: relative; z-index: 20; background: linear-gradient(170deg, #05090d 0%, #0a1520 40%, #0d1a28 100%); }

/* ── Left: Person ── */
.left-panel { flex: 0 0 40%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2vh 2vw; }
.person-photo {
  width: clamp(180px, 22vw, 280px); height: clamp(180px, 22vw, 280px);
  border-radius: 50%; object-fit: cover; border: 6px solid var(--border);
  transition: all 0.6s; margin-bottom: 2.5vh;
}
.person-photo.locked { box-shadow: 0 0 60px var(--glow); }
.placeholder-circle {
  width: clamp(180px, 22vw, 280px); height: clamp(180px, 22vw, 280px);
  border-radius: 50%; border: 6px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(5rem, 10vw, 8rem); color: var(--muted); font-weight: 900;
  background: rgba(255,255,255,0.03); margin-bottom: 2.5vh;
}
.person-name { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; text-align: center; min-height: 1.2em; }
.person-dept { font-size: clamp(1.1rem, 1.6vw, 1.4rem); color: var(--muted); text-align: center; min-height: 1.2em; }

/* ── Right: Grade + Best/Worst ── */
.right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2vh 3vw; border-left: 1px solid var(--border); }

.announce-grade {
  font-size: clamp(3.5rem, 7vw, 6rem); font-weight: 900; text-align: center;
  margin-bottom: 3vh; letter-spacing: 0.05em;
}

.result-badge {
  font-size: clamp(1.3rem, 2.2vw, 2rem); font-weight: 700; text-align: center;
  margin-bottom: 3vh; opacity: 0; transition: opacity 0.6s;
}
.result-badge.show { opacity: 1; }

/* Best/Worst cards */
.highlights { display: flex; gap: 3vw; opacity: 0; transition: opacity 0.6s; }
.highlights.show { opacity: 1; }
.hl-card { padding: 2.5vh 2.5vw; border-radius: 12px; text-align: center; min-width: clamp(180px, 16vw, 240px); }
.hl-card.best { background: rgba(89,210,143,0.08); border: 2px solid rgba(89,210,143,0.25); }
.hl-card.worst { background: rgba(255,45,45,0.08); border: 2px solid rgba(255,45,45,0.25); }
.hl-tag { font-size: clamp(0.9rem, 1.1vw, 1.05rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1vh; }
.hl-card.best .hl-tag { color: #59d28f; }
.hl-card.worst .hl-tag { color: #ff2d2d; }
.hl-dim { font-size: clamp(1rem, 1.4vw, 1.3rem); color: var(--muted); margin-bottom: 0.8vh; }
.hl-grade { font-size: clamp(3rem, 5vw, 4.5rem); font-weight: 900; }

/* Summary */
.summary-text {
  font-size: clamp(1rem, 1.4vw, 1.2rem); color: rgba(255,255,255,0.6);
  text-align: center; max-width: 500px; line-height: 1.7;
  margin-top: 2vh; opacity: 0; transition: opacity 0.6s;
}
.summary-text.show { opacity: 1; }

/* idle-screen은 더 이상 사용하지 않음 — 사이버펑크 대기화면으로 대체 */

/* Data status */
.data-status { position: fixed; bottom: 12px; right: 24px; font-size: 0.8rem; color: var(--muted); opacity: 0.5; }

@keyframes pop { 0%{transform:scale(2.5);opacity:0}50%{transform:scale(.9)}100%{transform:scale(1);opacity:1} }
</style>
</head>
<body class="cyber">

<canvas id="bgCanvas"></canvas>
<div class="scanline"></div>

<div class="top-bar">
  <div class="top-left">
    <img src="../jtbc.png" alt="JTBC">
    <div class="top-title-wrap">
      <div class="top-title glitch" data-text="ARCHE SYSTEM">ARCHE SYSTEM</div>
      <div class="top-sub">ORBIT CONSULTING — 중간 평가</div>
    </div>
  </div>
  <div class="top-status">
    <div>MID-EVALUATION v1.0</div>
    <div><span class="blink">●</span> LIVE — <span id="clock">00:00:00</span></div>
  </div>
  <div class="top-right"><img src="../kisti.svg" alt="KISTI"></div>
</div>

<!-- 사이버펑크 대기화면 -->
<div class="cyber-standby" id="cyberStandby">
  <div class="cyber-main">
    <div class="cyber-left">
      <div id="leftStreams"></div>
      <div class="survey-stream" id="surveyStream"></div>
    </div>
    <div class="cyber-center">
      <div class="computing-hub">
        <div class="computing-title">MID-EVALUATION</div>
        <canvas id="radarCanvas"></canvas>
        <div class="computing-progress">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-label" id="progressLabel">INITIALIZING...</div>
        </div>
        <div class="metric-cards" id="metricCards"></div>
      </div>
    </div>
    <div class="cyber-right" id="rightScores"></div>
  </div>
</div>

<!-- 평가 화면 (숫자키로 활성화) -->
<div class="app" id="app"></div>
<div class="data-status" id="dataStatus">기본 데이터</div>

<script src="../config.js"></script>
<script src="../cyber-bg.js"></script>
<script>
/* 대기화면 초기화 */
// 직급순: 차장 → 과장 → 대리 → 주임 → 사원 → 인턴
const _people = [
  { id:'p1', name:'하석진', title:'차장', dept:'미래전략기획실', img:'../img/hasukjin.png' },
  { id:'p5', name:'곽재식', title:'과장', dept:'품질관리팀',     img:'../img/kwakjaesik.png' },
  { id:'p2', name:'황제성', title:'대리', dept:'글로벌영업팀',   img:'../img/hwangjesung.png' },
  { id:'p3', name:'츠키',   title:'주임', dept:'인사팀',         img:'../img/tsuki.png' },
  { id:'p6', name:'가온',   title:'사원', dept:'홍보마케팅팀',   img:'../img/gaon.png' },
  { id:'p4', name:'허성범', title:'인턴', dept:'인사팀',         img:'../img/heosung.png' },
];
CyberBG.init({
  scores: CONFIG.MID_SCORES || {},
  people: _people,
  phase: 'mid',
});

let standbyActive = true;
function exitStandby() {
  if (!standbyActive) return;
  standbyActive = false;
  document.getElementById('cyberStandby').classList.add('hidden');
  document.getElementById('app').classList.add('active');
}
</script>
<script>
/* ═══════════════════════════════════════
   config.js → 점수 & 대상자 로드
   ═══════════════════════════════════════ */
// 직급순: 차장 → 과장 → 대리 → 주임 → 사원 → 인턴
const PEOPLE = [
  { id:'p1', name:'하석진', title:'차장', dept:'미래전략기획실', img:'../img/hasukjin.png' },
  { id:'p5', name:'곽재식', title:'과장', dept:'품질관리팀',     img:'../img/kwakjaesik.png' },
  { id:'p2', name:'황제성', title:'대리', dept:'글로벌영업팀',   img:'../img/hwangjesung.png' },
  { id:'p3', name:'츠키',   title:'주임', dept:'인사팀',         img:'../img/tsuki.png' },
  { id:'p6', name:'가온',   title:'사원', dept:'홍보마케팅팀',   img:'../img/gaon.png' },
  { id:'p4', name:'허성범', title:'인턴', dept:'인사팀',         img:'../img/heosung.png' }
];

const GRADES = ['S','A','B','C','D','F'];
const GC = { S:'#ffd700', A:'#59d28f', B:'#4ed9e8', C:'#f3b63f', D:'#ff6b3d', F:'#ff2d2d' };
const GL = { S:'최적', A:'안정', B:'양호', C:'보류', D:'주의', F:'해고 위기' };
const DK = ['contribution','competency','collaboration','crisis','intuition','ethics','aiVerification'];
const DL = { contribution:'성과 기여도', competency:'역량 평가', collaboration:'협업 태도', crisis:'위기 대응력', intuition:'인간의 직관력', ethics:'윤리적 책임감', aiVerification:'AI 검증력' };
const RANK = { S:6, A:5, B:4, C:3, D:2, F:1 };

// config.js에서 점수 로드
const SCORES = CONFIG.MID_SCORES;

// F/S 대상자 결정
let MID_F_ID, MID_S_ID;
if (CONFIG.MID_F_ID === 'auto' || CONFIG.MID_S_ID === 'auto') {
  let minScore = Infinity, maxScore = -Infinity, minId = '', maxId = '';
  for (const pid of Object.keys(SCORES)) {
    const total = DK.reduce((s, k) => s + (RANK[SCORES[pid][k]] || 0), 0);
    if (total < minScore) { minScore = total; minId = pid; }
    if (total > maxScore) { maxScore = total; maxId = pid; }
  }
  MID_F_ID = CONFIG.MID_F_ID === 'auto' ? minId : CONFIG.MID_F_ID;
  MID_S_ID = CONFIG.MID_S_ID === 'auto' ? maxId : CONFIG.MID_S_ID;
  document.getElementById('dataStatus').textContent = `자동: F=${PEOPLE.find(p=>p.id===MID_F_ID)?.name} / S=${PEOPLE.find(p=>p.id===MID_S_ID)?.name}`;
} else {
  MID_F_ID = CONFIG.MID_F_ID;
  MID_S_ID = CONFIG.MID_S_ID;
  document.getElementById('dataStatus').textContent = `수동: F=${PEOPLE.find(p=>p.id===MID_F_ID)?.name} / S=${PEOPLE.find(p=>p.id===MID_S_ID)?.name}`;
}

/* ═══════════════════════════════════════
   BEST / WORST 계산
   ═══════════════════════════════════════ */
function getBestWorst(pid) {
  const sc = SCORES[pid];
  if (!sc) return { best: DK[0], worst: DK[0], bestGrade: 'C', worstGrade: 'C' };
  let best = null, worst = null, bestR = -1, worstR = 99;
  for (const k of DK) {
    const r = RANK[sc[k]] || 0;
    if (r > bestR) { bestR = r; best = k; }
    if (r < worstR) { worstR = r; worst = k; }
  }
  return { best, worst, bestGrade: sc[best], worstGrade: sc[worst] };
}

/* ═══════════════════════════════════════
   UI
   ═══════════════════════════════════════ */
let mode = null; // 'F' or 'S'
let spinning = false;
let doneSet = new Set();

function selectMode(m) {
  if (spinning || doneSet.has(m)) return;
  mode = m;
  const gc = GC[m];

  document.getElementById('app').innerHTML = `
    <div class="left-panel">
      <div class="placeholder-circle" id="photoArea">?</div>
      <div class="person-name" id="rName" style="color:var(--muted)">? ? ?</div>
      <div class="person-dept" id="rDept">&nbsp;</div>
    </div>
    <div class="right-panel">
      <div class="announce-grade" style="color:${gc}">${m}등급 — ${GL[m]}</div>
      <div class="result-badge" id="rResult" style="color:${gc}">대상자 확정</div>
      <div class="highlights" id="hl">
        <div class="hl-card best">
          <div class="hl-tag">BEST</div>
          <div class="hl-dim" id="hlBestDim">—</div>
          <div class="hl-grade" id="hlBestG" style="color:var(--muted)">—</div>
        </div>
        <div class="hl-card worst">
          <div class="hl-tag">WORST</div>
          <div class="hl-dim" id="hlWorstDim">—</div>
          <div class="hl-grade" id="hlWorstG" style="color:var(--muted)">—</div>
        </div>
      </div>
      <div class="summary-text" id="rSummary"></div>
    </div>
  `;
}

// 사진 프리로드
const preloadedImgs = {};
PEOPLE.forEach(p => { const img = new Image(); img.src = p.img; preloadedImgs[p.id] = img; });

function showPerson(p) {
  const el = document.getElementById('photoArea');
  if (el.tagName === 'DIV') {
    el.outerHTML = `<img class="person-photo" id="photoArea" src="${p.img}">`;
  } else {
    el.src = p.img;
  }
  document.getElementById('rName').textContent = p.name;
  document.getElementById('rName').style.color = 'var(--text)';
  document.getElementById('rDept').textContent = `${p.dept} ${p.title}`;
}

function spinPeople() {
  if (!mode || spinning || doneSet.has(mode)) return;
  spinning = true;

  const gc = GC[mode];
  const targetId = mode === 'F' ? MID_F_ID : MID_S_ID;
  const target = PEOPLE.find(p => p.id === targetId);
  const bw = getBestWorst(targetId);

  // 룰렛 시퀀스 구성: 셔플된 전체 인원 × 여러 바퀴 + 감속 구간 + 타겟 도착
  const others = PEOPLE.filter(p => p.id !== targetId);
  const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

  // Phase 1: 빠른 회전 (3바퀴, 18명)
  const fast = [];
  for (let i = 0; i < 3; i++) fast.push(...shuffle(PEOPLE));

  // Phase 2: 감속 회전 (2바퀴, 점점 느려짐)
  const decel = [];
  for (let i = 0; i < 2; i++) decel.push(...shuffle(others));

  // Phase 3: 최종 접근 (타겟 앞 2~3명 + 타겟)
  const approach = shuffle(others).slice(0, 3);
  approach.push(target);

  const sequence = [...fast, ...decel, ...approach];
  const totalSteps = sequence.length;

  let step = 0;

  function nextStep() {
    if (step >= totalSteps) {
      lockOnTarget();
      return;
    }

    showPerson(sequence[step]);

    // 이징: 처음 빠르게 → 중간 유지 → 끝 느리게
    const progress = step / totalSteps;
    let delay;
    if (progress < 0.5) {
      // Phase 1: 빠른 회전 (80~120ms)
      delay = 80 + Math.random() * 40;
    } else if (progress < 0.8) {
      // Phase 2: 감속 시작 (120~350ms, 점점 느려짐)
      const t = (progress - 0.5) / 0.3; // 0→1
      delay = 120 + t * t * 230;
    } else {
      // Phase 3: 최종 접근 (400~900ms, 크게 느려짐)
      const t = (progress - 0.8) / 0.2; // 0→1
      delay = 400 + t * 500;
    }

    step++;
    setTimeout(nextStep, delay);
  }

  function lockOnTarget() {
    const photo = document.getElementById('photoArea');
    photo.src = target.img;
    photo.classList.add('locked');
    photo.style.borderColor = gc;
    photo.style.setProperty('--glow', gc + '50');
    const nameEl = document.getElementById('rName');
    nameEl.textContent = target.name;
    nameEl.style.color = gc;
    nameEl.style.animation = 'pop 0.5s cubic-bezier(0.22,1,0.36,1)';
    document.getElementById('rDept').textContent = `${target.dept} ${target.title}`;

    // Show result badge
    setTimeout(() => {
      document.getElementById('rResult')?.classList.add('show');
    }, 400);

    // Show best/worst
    setTimeout(() => {
      const hl = document.getElementById('hl');
      document.getElementById('hlBestDim').textContent = DL[bw.best];
      document.getElementById('hlBestG').textContent = bw.bestGrade;
      document.getElementById('hlBestG').style.color = GC[bw.bestGrade];
      document.getElementById('hlWorstDim').textContent = DL[bw.worst];
      document.getElementById('hlWorstG').textContent = bw.worstGrade;
      document.getElementById('hlWorstG').style.color = GC[bw.worstGrade];
      hl?.classList.add('show');
    }, 900);

    // Summary + TTS
    setTimeout(() => {
      const sm = document.getElementById('rSummary');
      const reason = mode === 'F'
        ? `${target.name} ${target.title}: 중간 평가 기준 ${DL[bw.worst]} 최하위 (${bw.worstGrade}등급). 해고 위기 대상자로 지정.`
        : `${target.name} ${target.title}: 중간 평가 기준 ${DL[bw.best]} 최고 (${bw.bestGrade}등급). 최적 인재로 확정.`;
      sm.textContent = reason;
      sm.classList.add('show');

      doneSet.add(mode);
      spinning = false;

      if (window.speechSynthesis) {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(
          `중간 평가. ${target.dept} ${target.title} ${target.name}. ${mode}등급, ${GL[mode]}.`
        );
        u.lang = 'ko-KR'; u.rate = 0.85;
        speechSynthesis.speak(u);
      }
    }, 1500);
  }

  nextStep();
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key === '1') { e.preventDefault(); exitStandby(); selectMode('F'); }
  if (e.key === '2') { e.preventDefault(); exitStandby(); selectMode('S'); }
  if (e.key === ' ') { e.preventDefault(); spinPeople(); }
});

/* ── Init complete ── */
</script>
</body>
</html>
