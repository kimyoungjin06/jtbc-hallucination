<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할루시네이션: 해고전쟁 — 최종 인사발령</title>
<link rel="stylesheet" href="../common.css">
<link rel="stylesheet" href="../cyber-bg.css">
<style>
:root {
  --cyan: #00f0ff; --magenta: #ff00aa; --gold: #ffd700; --red: #ff2d2d;
  --green: #59d28f; --orange: #ff6b3d; --blue: #6366f1;
  --bg: #0a0a12;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; height: 100vh; overflow: hidden; cursor: none; }

/* ── Verdict overlay ── */
.verdict-overlay {
  position: fixed; inset: 0; z-index: 300; background: #000;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 4vh 4vw; opacity: 0; transition: opacity 0.8s;
}
.verdict-overlay.show { display: flex; }
.verdict-overlay.visible { opacity: 1; }

.verdict-top { display: flex; align-items: center; gap: 3vw; margin-bottom: 3vh; opacity: 0; transition: opacity 0.6s; transform: translateY(20px); }
.verdict-top.show { opacity: 1; transform: translateY(0); transition: opacity 0.6s, transform 0.6s cubic-bezier(0.22,1,0.36,1); }
.verdict-photo { width: clamp(140px, 16vw, 200px); height: clamp(140px, 16vw, 200px); border-radius: 50%; object-fit: cover; border: 5px solid rgba(255,255,255,0.1); transition: border-color 0.6s, box-shadow 0.6s; }
.verdict-photo.glow { box-shadow: 0 0 40px var(--glow-color); }
.verdict-identity { text-align: left; }
.verdict-name { font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 900; }
.verdict-dept { font-size: clamp(1rem, 1.5vw, 1.3rem); color: rgba(255,255,255,0.4); margin-top: 0.3vh; }
.verdict-grade-badge { display: flex; align-items: center; gap: 1.5vw; margin-top: 1vh; }
.verdict-grade { font-family: 'Orbitron', sans-serif; font-size: clamp(5rem, 10vw, 8rem); font-weight: 900; text-shadow: 0 0 80px currentColor, 0 0 30px currentColor; animation: verdictPop 0.6s cubic-bezier(0.22,1,0.36,1); }
.verdict-label { font-size: clamp(1.2rem, 2vw, 1.7rem); font-weight: 700; }

/* 평가문 3단계 */
.verdict-speech { max-width: 700px; text-align: center; }
.verdict-eval {
  font-size: clamp(1.1rem, 1.5vw, 1.35rem); color: rgba(255,255,255,0.7);
  line-height: 2; margin-bottom: 2.5vh; opacity: 0; transition: opacity 0.8s;
}
.verdict-eval.show { opacity: 1; }
.verdict-eval .cursor { display: inline-block; width: 2px; height: 1em; background: var(--cyan); margin-left: 2px; animation: cursorBlink 0.6s step-end infinite; vertical-align: text-bottom; }
@keyframes cursorBlink { 0%,100%{opacity:1}50%{opacity:0} }

.verdict-conclusion {
  font-size: clamp(1.4rem, 2.2vw, 2rem); font-weight: 900;
  line-height: 1.8; margin-bottom: 1.5vh; opacity: 0; transition: opacity 0.8s;
}
.verdict-conclusion.show { opacity: 1; }
.verdict-order {
  font-size: clamp(1rem, 1.4vw, 1.2rem); color: rgba(255,255,255,0.4);
  font-style: italic; line-height: 1.7; opacity: 0; transition: opacity 0.8s;
}
.verdict-order.show { opacity: 1; }

.verdict-oneliner {
  font-size: clamp(1.3rem, 2vw, 1.8rem); font-weight: 900; color: var(--cyan);
  line-height: 1.8; margin: 2vh 0; padding: 1.5vh 2vw;
  border-left: 3px solid var(--cyan); text-align: left;
  opacity: 0; transform: translateX(-10px); transition: opacity 0.6s, transform 0.5s;
}
.verdict-oneliner.show { opacity: 1; transform: translateX(0); }
.verdict-divider { width: 60px; height: 2px; background: rgba(255,255,255,0.1); margin: 1.5vh auto; opacity: 0; transition: opacity 0.5s; }
.verdict-divider.show { opacity: 1; }

.verdict-status {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 3.5vw, 3rem);
  font-weight: 900; margin-top: 2vh; letter-spacing: 0.2em;
  opacity: 0; transform: scale(0.8); transition: opacity 0.6s, transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.verdict-status.show { opacity: 1; transform: scale(1); }

@keyframes verdictPop { 0%{transform:scale(3);opacity:0}50%{transform:scale(.85)}100%{transform:scale(1);opacity:1} }

/* Scan line effect */
.scanline { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.15; z-index: 100; animation: scanDown 4s linear infinite; pointer-events: none; }
@keyframes scanDown { from { top: 0; } to { top: 100vh; } }

/* Glitch text */
.glitch { position: relative; }
.glitch::before, .glitch::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; overflow: hidden; }
.glitch::before { color: var(--cyan); animation: glitch1 3s infinite; clip-path: inset(0 0 80% 0); }
.glitch::after { color: var(--magenta); animation: glitch2 3s infinite; clip-path: inset(80% 0 0 0); }
@keyframes glitch1 { 0%,95%{transform:translateX(0)}96%{transform:translateX(-3px)}97%{transform:translateX(3px)}98%{transform:translateX(-1px)}100%{transform:translateX(0)} }
@keyframes glitch2 { 0%,95%{transform:translateX(0)}96%{transform:translateX(2px)}97%{transform:translateX(-2px)}98%{transform:translateX(1px)}100%{transform:translateX(0)} }
</style>
</head>
<body class="cyber">

<canvas id="bgCanvas"></canvas>
<div class="scanline"></div>

<div class="top-bar">
  <div class="top-left">
    <img src="../jtbc.png" alt="JTBC">
    <div class="top-title-wrap">
      <div class="top-title glitch" data-text="ARCHE SYSTEM">ARCHE SYSTEM</div>
      <div class="top-sub">ORBIT CONSULTING — 최종 인사발령</div>
    </div>
  </div>
  <div class="top-status">
    <div>EVALUATION ENGINE v3.7.1</div>
    <div><span class="blink">●</span> LIVE — <span id="clock">00:00:00</span></div>
  </div>
  <div class="top-right"><img src="../kisti.svg" alt="KISTI"></div>
</div>

<div class="cyber-main">
  <div class="cyber-left">
    <div id="leftStreams"></div>
    <div class="survey-stream" id="surveyStream"></div>
  </div>
  <div class="cyber-center">
    <div class="computing-hub">
      <div class="computing-title">FINAL EVALUATION</div>
      <canvas id="radarCanvas"></canvas>
      <div class="computing-progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">INITIALIZING ARCHE ALGORITHM...</div>
      </div>
      <div class="metric-cards" id="metricCards"></div>
    </div>
  </div>
  <div class="cyber-right" id="rightScores"></div>
</div>

<div class="verdict-overlay" id="verdictOverlay">
  <div class="verdict-top" id="verdictTop">
    <img class="verdict-photo" id="vPhoto" src="">
    <div class="verdict-identity">
      <div class="verdict-name" id="vName"></div>
      <div class="verdict-dept" id="vDept"></div>
      <div class="verdict-grade-badge" id="vGradeBadge" style="display:none">
        <div class="verdict-grade" id="vGrade"></div>
        <div class="verdict-label" id="vLabel"></div>
      </div>
    </div>
  </div>
  <div class="verdict-speech">
    <div class="verdict-eval" id="vEval"></div>
    <div class="verdict-oneliner" id="vOneliner"></div>
    <div class="verdict-divider" id="vDivider"></div>
    <div class="verdict-conclusion" id="vConclusion"></div>
    <div class="verdict-order" id="vOrder"></div>
  </div>
  <div class="verdict-status" id="vStatus"></div>
</div>

<script src="../config.js"></script>
<script src="../cyber-bg.js"></script>
<script>
/* ═══════════════════════════════════════
   DATA — CyberBG 모듈 사용
   ═══════════════════════════════════════ */
// 직급순: 차장 → 과장 → 대리 → 주임 → 사원 → 인턴
const PEOPLE = [
  { id:'p1', name:'하석진', title:'차장', dept:'미래전략기획실', img:'../img/hasukjin.png' },
  { id:'p5', name:'곽재식', title:'과장', dept:'품질관리팀',     img:'../img/kwakjaesik.png' },
  { id:'p2', name:'황제성', title:'대리', dept:'글로벌영업팀',   img:'../img/hwangjesung.png' },
  { id:'p3', name:'츠키',   title:'주임', dept:'인사팀',         img:'../img/tsuki.png' },
  { id:'p6', name:'가온',   title:'사원', dept:'홍보마케팅팀',   img:'../img/gaon.png' },
  { id:'p4', name:'허성범', title:'인턴', dept:'인사팀',         img:'../img/heosung.png' },
];

const { GRADES, GC, DK, DL, RANK } = CyberBG;

const SCORES = CONFIG.FINAL_SCORES || CONFIG.MID_SCORES;
const FIRED = CONFIG.FINAL_FIRED || [];
const RETAINED = CONFIG.FINAL_RETAINED || [];
const VERDICTS = CONFIG.FINAL_VERDICTS || {};

// 사이버펑크 대기화면 초기화 (레이더 차트 + 설문 + 게이지 바 포함)
CyberBG.init({
  scores: SCORES,
  people: PEOPLE,
  phase: 'final',
});

/* ═══════════════════════════════════════
   VERDICT SYSTEM
   숫자키 1~6 → 사람 선택 (발표 순서)
   Space → 최종 통보 연출
   ═══════════════════════════════════════ */
// 발표 순서: config에서 가져옴 (FIRED 먼저, RETAINED 나중)
// 직급순 발표 (config에서 가져옴, 없으면 해고→고용 순)
const VERDICT_ORDER = CONFIG.FINAL_ORDER || [...FIRED, ...RETAINED];
let verdictIdx = -1;
let verdictBusy = false;
let verdictDone = new Set();

function selectVerdict(num) {
  if (verdictBusy) return;
  const idx = num - 1;
  if (idx < 0 || idx >= VERDICT_ORDER.length) return;
  verdictIdx = idx;
  // Brief flash on computing hub
  document.getElementById('progressLabel').textContent = `TARGET LOCKED: ${PEOPLE.find(p=>p.id===VERDICT_ORDER[idx])?.name || '???'}`;
}

let evalTypeTimer = null;

function typeText(el, text, speed, onDone) {
  if (evalTypeTimer) { clearInterval(evalTypeTimer); evalTypeTimer = null; }
  let idx = 0;
  const chars = [...text];
  evalTypeTimer = setInterval(() => {
    if (idx < chars.length) {
      el.innerHTML = text.substring(0, idx + 1) + '<span class="cursor"></span>';
      idx++;
    } else {
      clearInterval(evalTypeTimer); evalTypeTimer = null;
      el.innerHTML = text;
      if (onDone) onDone();
    }
  }, speed);
}

function executeVerdict() {
  if (verdictIdx < 0 || verdictBusy) return;
  const pid = VERDICT_ORDER[verdictIdx];
  if (verdictDone.has(pid)) return;
  verdictBusy = true;

  const person = PEOPLE.find(p => p.id === pid);
  const isFired = FIRED.includes(pid);
  const gc = isFired ? '#ff2d2d' : '#59d28f';
  const v = VERDICTS[pid] || {};

  const overlay = document.getElementById('verdictOverlay');
  const topEl = document.getElementById('verdictTop');
  const photo = document.getElementById('vPhoto');

  // ── Reset ──
  overlay.classList.remove('visible');
  topEl.classList.remove('show');
  photo.classList.remove('glow');
  document.getElementById('vGradeBadge').style.display = 'none';
  ['vEval','vOneliner','vConclusion','vOrder','vStatus','vDivider'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('show'); el.textContent = ''; }
  });

  // ── Phase 0 (0s): 암전 페이드인 ──
  photo.src = person.img;
  photo.style.borderColor = 'rgba(255,255,255,0.1)';
  photo.style.setProperty('--glow-color', gc + '60');
  document.getElementById('vName').textContent = person.name;
  document.getElementById('vName').style.color = '#e0e0e0';
  document.getElementById('vDept').textContent = `${person.dept} ${person.title}`;
  overlay.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));

  // 이전 타이머 정리
  verdictTimers.forEach(clearTimeout);
  verdictTimers.length = 0;
  stopAllTTS();

  function vt(fn, ms) { verdictTimers.push(setTimeout(fn, ms)); }

  // ── Phase 1 (1s): 인물 등장 ──
  vt(() => topEl.classList.add('show'), 1000);

  // ── Phase 2 (2.5s): 평가문 타이핑 + TTS ──
  vt(() => {
    const evalEl = document.getElementById('vEval');
    evalEl.classList.add('show');
    tryTTS(v.evaluation || '');
    typeText(evalEl, v.evaluation || '(평가문 없음)', 35, () => {
      // 타이핑 완료 → 일침
      vt(() => {
        const olEl = document.getElementById('vOneliner');
        olEl.textContent = v.oneliner || '';
        olEl.style.borderColor = gc;
        olEl.style.color = gc;
        olEl.classList.add('show');
        tryTTS(v.oneliner || '');
        // 일침 후 → 판정
        vt(showJudgment, Math.max(2000, (v.oneliner||'').length * 100));
      }, 800);
    });
  }, 2500);

  function showJudgment() {
    document.getElementById('vDivider').classList.add('show');

    vt(() => {
      const badge = document.getElementById('vGradeBadge');
      badge.style.display = 'flex';
      document.getElementById('vGrade').style.color = gc;
      document.getElementById('vGrade').textContent = isFired ? '해고' : '유지';
      document.getElementById('vLabel').style.color = gc;
      document.getElementById('vLabel').textContent = '';

      photo.style.borderColor = gc;
      photo.classList.add('glow');
      document.getElementById('vName').style.color = gc;

      const concEl = document.getElementById('vConclusion');
      concEl.textContent = v.conclusion || '';
      concEl.style.color = gc;
      concEl.classList.add('show');

      tryTTS(`${v.conclusion || ''} ${v.order || ''}`);
    }, 500);

    vt(() => {
      document.getElementById('vOrder').textContent = v.order || '';
      document.getElementById('vOrder').classList.add('show');
    }, 2500);

    vt(() => {
      const status = document.getElementById('vStatus');
      status.style.color = gc;
      status.textContent = '';
      status.classList.remove('show');
      verdictDone.add(pid);
      verdictBusy = false;
    }, 3500);
  }
}

const verdictTimers = [];
function closeVerdict() {
  // 타이핑 중지
  if (evalTypeTimer) { clearInterval(evalTypeTimer); evalTypeTimer = null; }
  // 모든 예약된 타이머 취소
  verdictTimers.forEach(clearTimeout);
  verdictTimers.length = 0;
  // TTS 중지 (브라우저 + OpenAI 오디오)
  stopAllTTS();
  // 페이드아웃
  const overlay = document.getElementById('verdictOverlay');
  overlay.classList.remove('visible');
  setTimeout(() => overlay.classList.remove('show'), 800);
  verdictBusy = false;
}

/* ═══════════════════════════════════════
   TTS — team_agent_vis 서버 연동
   이전 TTS를 멈추고 새로 재생
   ═══════════════════════════════════════ */
let currentAudio = null;

function stopAllTTS() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
}

async function tryTTS(text) {
  stopAllTTS();
  if (!text) return;

  // 먼저 team_agent_vis 서버 시도
  try {
    const res = await fetch((CONFIG.TEAM_VIZ_URL || 'http://localhost:3000') + '/api/executor/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text, provider: 'openai', voiceId: 'onyx',
        filter: 'executor', production: 'courtdrama',
        speakingRate: 0.82, flattenIntonation: true,
      }),
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      return;
    }
  } catch {}

  // 폴백: 브라우저 TTS
  if (window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.8;
    speechSynthesis.speak(u);
  }
}

/* ═══════════════════════════════════════
   KEYBOARD
   ═══════════════════════════════════════ */
// QWERTY → 직급순 매핑 (Q=차장, W=과장, E=대리, R=주임, T=사원, Y=인턴)
const QWERTY_MAP = { q:1, w:2, e:3, r:4, t:5, y:6 };

document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '6') { e.preventDefault(); selectVerdict(parseInt(e.key)); }
  if (QWERTY_MAP[e.key.toLowerCase()]) { e.preventDefault(); selectVerdict(QWERTY_MAP[e.key.toLowerCase()]); }
  if (e.key === ' ') { e.preventDefault(); executeVerdict(); }
  if (e.key === 'Escape') { e.preventDefault(); closeVerdict(); }
});
</script>
</body>
</html>
